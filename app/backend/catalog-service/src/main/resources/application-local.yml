# Local development configuration
# Activate with: -Dspring.profiles.active=local

# Environment variable overrides for local development
SERVER_PORT: 8083
DB_URL: jdbc:mysql://localhost:3306/uniplan_catalog?createDatabaseIfNotExist=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
DB_USER: user
DB_PASSWORD: password

# Local overrides
spring:
  jpa:
    show-sql: true

# Tracing (Tempo 없이 실행 시 연결 경고가 발생하나 앱 동작에는 영향 없음)
management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

# Debug logging
logging:
  level:
    com.uniplan.catalog: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
