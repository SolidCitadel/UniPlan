# dev 전용 additions. docker compose up 시 자동 적용됨.
# test 환경: docker compose -f docker-compose.yml -f docker-compose.test.yml up
# 이 파일은 인프라 구조(container_name, ports, volumes)만 정의한다.
# 환경변수 값은 .env 파일에서 관리한다 (cp .env.example .env).
services:
  redis:
    container_name: uniplan-redis
    ports:
      - "6379:6379"

  mysql:
    container_name: uniplan-mysql
    ports:
      - "3316:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  api-gateway:
    container_name: uniplan-api-gateway

  prometheus:
    container_name: uniplan-prometheus

  tempo:
    container_name: uniplan-tempo
    volumes:
      - tempo-data:/var/tempo

  loki:
    container_name: uniplan-loki
    volumes:
      - loki-data:/loki

  promtail:
    container_name: uniplan-promtail
    volumes:
      - promtail-positions:/run/promtail

  grafana:
    container_name: uniplan-grafana
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  mysql-data:
  tempo-data:
  loki-data:
  grafana-data:
  promtail-positions:
