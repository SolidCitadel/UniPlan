# test 전용 override. base와 함께 사용:
#   docker compose -f docker-compose.yml -f docker-compose.test.yml up
#   docker compose -f docker-compose.yml -f docker-compose.test.yml --profile observability up
# 이 파일은 인프라 override(tmpfs, ports)만 정의한다.
# 환경변수 값은 .env 파일에서 관리한다 (cp .env.example .env).
services:
  redis:
    tmpfs:
      - /data

  mysql:
    tmpfs:
      - /var/lib/mysql

  # ─────────────────────────────────────────────────────────────────────────────
  # Observability 스택: 테스트 격리를 위해 데이터 디렉터리를 tmpfs로 교체
  # ─────────────────────────────────────────────────────────────────────────────

  tempo:
    volumes:
      - type: tmpfs
        target: /var/tempo
        tmpfs:
          mode: 0777

  loki:
    volumes:
      - type: tmpfs
        target: /loki
        tmpfs:
          mode: 0777

  promtail:
    volumes:
      - type: tmpfs
        target: /run/promtail
        tmpfs:
          mode: 0777

  grafana:
    volumes:
      - type: tmpfs
        target: /var/lib/grafana
        tmpfs:
          mode: 0777
