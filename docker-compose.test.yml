# test 전용 override. base와 함께 사용:
#   docker compose -f docker-compose.yml -f docker-compose.test.yml up
#   docker compose -f docker-compose.yml -f docker-compose.test.yml --profile observability up
services:
  redis:
    tmpfs:
      - /data

  mysql:
    tmpfs:
      - /var/lib/mysql

  catalog-service:
    ports:
      - "8083:8083"

  user-service:
    environment:
      JWT_SECRET: test-jwt-secret-32bytes-long-1234567

  api-gateway:
    environment:
      JWT_SECRET: test-jwt-secret-32bytes-long-1234567

  # ─────────────────────────────────────────────────────────────────────────────
  # Observability 스택: 테스트 격리를 위해 데이터 디렉터리를 tmpfs로 교체
  # ─────────────────────────────────────────────────────────────────────────────

  tempo:
    volumes:
      - type: tmpfs
        target: /var/tempo
        tmpfs:
          mode: 0777

  loki:
    volumes:
      - type: tmpfs
        target: /loki
        tmpfs:
          mode: 0777

  promtail:
    volumes:
      - type: tmpfs
        target: /run/promtail
        tmpfs:
          mode: 0777

  grafana:
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - type: tmpfs
        target: /var/lib/grafana
        tmpfs:
          mode: 0777
