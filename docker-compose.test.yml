services:
  redis-test:
    image: redis:7-alpine
    container_name: uniplan-redis-test
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-test:
    image: mysql:8.4
    container_name: uniplan-mysql-test
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    command:
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
    tmpfs:
      - /var/lib/mysql
    volumes:
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service-test:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        SERVICE: user-service
    environment:
      SERVER_PORT: 8081
      DB_URL: jdbc:mysql://mysql-test:3306/uniplan_user?createDatabaseIfNotExist=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      DB_USER: user
      DB_PASSWORD: password
      GOOGLE_CLIENT_ID: dummy
      GOOGLE_CLIENT_SECRET: dummy
      OAUTH2_REDIRECT_URL: http://localhost:3000/auth/callback
      JWT_SECRET: test-jwt-secret-32bytes-long-1234567
      TRACING_SAMPLING_PROBABILITY: "1.0"
      OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces
    networks:
      default:
        aliases:
          - user-service
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      mysql-test:
        condition: service_healthy

  catalog-service-test:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        SERVICE: catalog-service
    environment:
      SERVER_PORT: 8083
      DB_URL: jdbc:mysql://mysql-test:3306/uniplan_catalog?createDatabaseIfNotExist=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      DB_USER: user
      DB_PASSWORD: password
      TRACING_SAMPLING_PROBABILITY: "1.0"
      OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces
    networks:
      default:
        aliases:
          - catalog-service
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      mysql-test:
        condition: service_healthy

  planner-service-test:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        SERVICE: planner-service
    environment:
      SERVER_PORT: 8082
      DB_URL: jdbc:mysql://mysql-test:3306/uniplan_planner?createDatabaseIfNotExist=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      DB_USER: user
      DB_PASSWORD: password
      CATALOG_SERVICE_URL: http://catalog-service-test:8083
      REDIS_HOST: redis-test
      REDIS_PORT: 6379
      TRACING_SAMPLING_PROBABILITY: "1.0"
      OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces
    networks:
      default:
        aliases:
          - planner-service
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      mysql-test:
        condition: service_healthy
      catalog-service-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy

  api-gateway-test:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        SERVICE: api-gateway
    environment:
      SERVER_PORT: 8080
      USER_SERVICE_URI: http://user-service-test:8081
      PLANNER_SERVICE_URI: http://planner-service-test:8082
      CATALOG_SERVICE_URI: http://catalog-service-test:8083
      JWT_SECRET: test-jwt-secret-32bytes-long-1234567
      CORS_ALLOWED_ORIGINS: "*"
      TRACING_SAMPLING_PROBABILITY: "1.0"
      OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces
    networks:
      default:
        aliases:
          - api-gateway
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      user-service-test:
        condition: service_healthy
      planner-service-test:
        condition: service_healthy
      catalog-service-test:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────────────────────────
  # Observability 스택 (프로파일 기동: docker compose -f docker-compose.test.yml --profile observability up)
  # ─────────────────────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v3.2.1
    profiles: [observability]
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  tempo:
    image: grafana/tempo:2.7.2
    profiles: [observability]
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./docker/tempo/tempo.yml:/etc/tempo.yaml:ro
      - type: tmpfs
        target: /var/tempo
        tmpfs:
          mode: 0777
    ports:
      - "3200:3200"

  loki:
    image: grafana/loki:3.3.2
    profiles: [observability]
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/loki-config.yaml:ro
      - type: tmpfs
        target: /loki
        tmpfs:
          mode: 0777
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  promtail:
    image: grafana/promtail:3.3.2
    profiles: [observability]
    command: -config.file=/etc/promtail/promtail-config.yaml
    volumes:
      - ./docker/promtail/promtail-config.yml:/etc/promtail/promtail-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - promtail-positions:/run/promtail
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.5.2
    profiles: [observability]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - tempo
      - loki

volumes:
  grafana-data:
  promtail-positions:
