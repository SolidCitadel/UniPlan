services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORDл•Љ .envмЧР мД§м†ХнХШмДЄмЪФ (.env.example м∞Єк≥†)}
      MYSQL_USER: ${DB_USER:?DB_USERл•Љ .envмЧР мД§м†ХнХШмДЄмЪФ}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORDл•Љ .envмЧР мД§м†ХнХШмДЄмЪФ}
    command:
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
    volumes:
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      # $$MYSQL_ROOT_PASSWORD: Compose мєШнЩШ мЧЖмЭі мї®нЕМмЭілДИ лВілґА нЩШк≤љл≥АмИШл°Ь м†ДлЛђ
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        SERVICE: user-service
    environment:
      SERVER_PORT: 8081
      DB_URL: jdbc:mysql://mysql:3306/uniplan_user?createDatabaseIfNotExist=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      DB_USER: ${DB_USER:?DB_USERл•Љ .envмЧР мД§м†ХнХШмДЄмЪФ}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORDл•Љ .envмЧР мД§м†ХнХШмДЄмЪФ}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRETл•Љ .envмЧР мД§м†ХнХШмДЄмЪФ}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_IDл•Љ .envмЧР мД§м†ХнХШмДЄмЪФ}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?GOOGLE_CLIENT_SECRETл•Љ .envмЧР мД§м†ХнХШмДЄмЪФ}
      OAUTH2_REDIRECT_URL: ${OAUTH2_REDIRECT_URL:?OAUTH2_REDIRECT_URLл•Љ .envмЧР мД§м†ХнХШмДЄмЪФ}
      TRACING_SAMPLING_PROBABILITY: "1.0"
      OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      mysql:
        condition: service_healthy

  catalog-service:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        SERVICE: catalog-service
    environment:
      SERVER_PORT: 8083
      DB_URL: jdbc:mysql://mysql:3306/uniplan_catalog?createDatabaseIfNotExist=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      DB_USER: ${DB_USER:?DB_USERл•Љ .envмЧР мД§м†ХнХШмДЄмЪФ}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORDл•Љ .envмЧР мД§м†ХнХШмДЄмЪФ}
      TRACING_SAMPLING_PROBABILITY: "1.0"
      OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces
    ports:
      - "8083:8083"  # Integration нЕМмК§нКЄ лН∞мЭінД∞ мЛЬлФ© л∞П мІБм†С м†СкЈЉмЪ©
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      mysql:
        condition: service_healthy

  planner-service:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        SERVICE: planner-service
    environment:
      SERVER_PORT: 8082
      DB_URL: jdbc:mysql://mysql:3306/uniplan_planner?createDatabaseIfNotExist=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      DB_USER: ${DB_USER:?DB_USERл•Љ .envмЧР мД§м†ХнХШмДЄмЪФ}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORDл•Љ .envмЧР мД§м†ХнХШмДЄмЪФ}
      CATALOG_SERVICE_URL: http://catalog-service:8083
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TRACING_SAMPLING_PROBABILITY: "1.0"
      OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      mysql:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      redis:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        SERVICE: api-gateway
    environment:
      SERVER_PORT: 8080
      USER_SERVICE_URI: http://user-service:8081
      PLANNER_SERVICE_URI: http://planner-service:8082
      CATALOG_SERVICE_URI: http://catalog-service:8083
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRETл•Љ .envмЧР мД§м†ХнХШмДЄмЪФ}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINSл•Љ .envмЧР мД§м†ХнХШмДЄмЪФ}
      TRACING_SAMPLING_PROBABILITY: "1.0"
      OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      user-service:
        condition: service_healthy
      planner-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy

  # вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
  # Observability мК§нГЭ (нФДл°ЬнММмЭЉ кЄ∞лПЩ: docker compose --profile observability up)
  # вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА

  prometheus:
    image: prom/prometheus:v3.2.1
    profiles: [observability]
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  tempo:
    image: grafana/tempo:2.7.2
    profiles: [observability]
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./docker/tempo/tempo.yml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"  # к∞Ьл∞Ь/нЕМмК§нКЄ м†СкЈЉмЪ©. лВілґАлІЭ: мХ±вЖТ4318(OTLP), GrafanaвЖТ3200(API)

  loki:
    image: grafana/loki:3.3.2
    profiles: [observability]
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/loki-config.yaml:ro
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  promtail:
    image: grafana/promtail:3.3.2
    profiles: [observability]
    command: -config.file=/etc/promtail/promtail-config.yaml
    volumes:
      - ./docker/promtail/promtail-config.yml:/etc/promtail/promtail-config.yaml:ro
      # л°Ьмїђ к∞Ьл∞Ь м†ДмЪ©: Docker мЖМмЉУмЬЉл°Ь мї®нЕМмЭілДИ мЮРлПЩ л∞Ьк≤ђ
      # нФДл°ЬлНХмЕШмЧРмДЬлКФ Sidecar нМ®нДімЭілВШ Loki Docker Driver лУ± лМАмХИ к≤АнЖ† нХДмЪФ
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.5.2
    profiles: [observability]
    environment:
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORDл•Љ .envмЧР мД§м†ХнХШмДЄмЪФ}
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - tempo
      - loki
