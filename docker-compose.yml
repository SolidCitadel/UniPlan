services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.4
    # TODO(기술 부채): 아래 자격증명은 개발/테스트용 고정값.
    # 프로덕션에서는 docker-compose.prod.yml에서 반드시 ${DB_PASSWORD} 등 환경변수로 재정의할 것.
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    command:
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
    volumes:
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        SERVICE: user-service
    environment:
      SERVER_PORT: 8081
      DB_URL: jdbc:mysql://mysql:3306/uniplan_user?createDatabaseIfNotExist=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      DB_USER: user
      DB_PASSWORD: password
      GOOGLE_CLIENT_ID: dummy
      GOOGLE_CLIENT_SECRET: dummy
      OAUTH2_REDIRECT_URL: http://localhost:3000/auth/callback
      TRACING_SAMPLING_PROBABILITY: "1.0"
      OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      mysql:
        condition: service_healthy

  catalog-service:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        SERVICE: catalog-service
    environment:
      SERVER_PORT: 8083
      DB_URL: jdbc:mysql://mysql:3306/uniplan_catalog?createDatabaseIfNotExist=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      DB_USER: user
      DB_PASSWORD: password
      TRACING_SAMPLING_PROBABILITY: "1.0"
      OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      mysql:
        condition: service_healthy

  planner-service:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        SERVICE: planner-service
    environment:
      SERVER_PORT: 8082
      DB_URL: jdbc:mysql://mysql:3306/uniplan_planner?createDatabaseIfNotExist=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      DB_USER: user
      DB_PASSWORD: password
      CATALOG_SERVICE_URL: http://catalog-service:8083
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TRACING_SAMPLING_PROBABILITY: "1.0"
      OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      mysql:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      redis:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        SERVICE: api-gateway
    environment:
      SERVER_PORT: 8080
      USER_SERVICE_URI: http://user-service:8081
      PLANNER_SERVICE_URI: http://planner-service:8082
      CATALOG_SERVICE_URI: http://catalog-service:8083
      CORS_ALLOWED_ORIGINS: "*"
      TRACING_SAMPLING_PROBABILITY: "1.0"
      OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      user-service:
        condition: service_healthy
      planner-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────────────────────────
  # Observability 스택 (프로파일 기동: docker compose --profile observability up)
  # ─────────────────────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v3.2.1
    profiles: [observability]
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  tempo:
    image: grafana/tempo:2.7.2
    profiles: [observability]
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./docker/tempo/tempo.yml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"  # 개발/테스트 접근용. 내부망: 앱→4318(OTLP), Grafana→3200(API)

  loki:
    image: grafana/loki:3.3.2
    profiles: [observability]
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/loki-config.yaml:ro
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  promtail:
    image: grafana/promtail:3.3.2
    profiles: [observability]
    command: -config.file=/etc/promtail/promtail-config.yaml
    volumes:
      - ./docker/promtail/promtail-config.yml:/etc/promtail/promtail-config.yaml:ro
      # 로컬 개발 전용: Docker 소켓으로 컨테이너 자동 발견
      # 프로덕션에서는 Sidecar 패턴이나 Loki Docker Driver 등 대안 검토 필요
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.5.2
    profiles: [observability]
    environment:
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - tempo
      - loki
