apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    editable: false
    jsonData:
      tracesToLogs:
        datasourceUid: loki           # Loki 데이터소스 uid (loki.yml의 uid 필드와 일치)
        tags:
          - key: service.name
            value: service            # OTel service.name → Loki 레이블 'service' 매핑
        filterByTraceID: true
        filterBySpanID: false
      tracesToMetrics:
        datasourceUid: prometheus     # Prometheus 데이터소스 uid (prometheus.yml의 uid 필드와 일치)
        tags:
          - key: service.name
            value: application        # OTel service.name → Prometheus 레이블 'application' 매핑
