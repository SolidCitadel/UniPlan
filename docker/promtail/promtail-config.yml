server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /run/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=uniplan"]
    relabel_configs:
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_name]
        regex: /(.+)
        target_label: container
    pipeline_stages:
      - json:
          expressions:
            level: level
            traceId: traceId
            requestId: requestId
            extracted_message: message
      - labels:
          level:
      - structured_metadata:
          traceId:
          requestId:
      - output:
          source: extracted_message
